name: Lumen Scout — Monitor Bandi

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          pip install requests beautifulsoup4 pandas openpyxl anthropic

      - name: Esegui monitor bandi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        run: python scraper_bandi.py

      - name: Salva Excel su GitHub
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add bandi_campania.xlsx
          git diff --staged --quiet || git commit -m "Aggiornamento automatico bandi $(date +'%Y-%m-%d')"
          git push
